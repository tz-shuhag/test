<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TZ Shuhag</title>
  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
    }

    /* ─── Full-screen stage ──────────────────────────── */
    #landing {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ─── Text grid — fills the ENTIRE screen ────────── */
    #text-bg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      z-index: 0;
    }

    /* Each row is a flex container holding two identical spans */
    .t-row {
      flex: 1;
      display: flex;
      align-items: center;
      overflow: hidden;
      min-height: 0;
    }

    /* Two spans per row — the classic seamless scroll trick */
    .t-span {
      flex-shrink: 0;
      white-space: nowrap;
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(42px, 8.5vw, 138px);
      color: #00ffab;
      line-height: 1;
      letter-spacing: 0.01em;
      user-select: none;
      pointer-events: none;
      will-change: transform;
    }

    /* Seamless left / right marquee keyframes */
    @keyframes scroll-left {
      from { transform: translateX(0); }
      to   { transform: translateX(-100%); }
    }
    @keyframes scroll-right {
      from { transform: translateX(-100%); }
      to   { transform: translateX(0); }
    }

    /* ─── Radial vignette ────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(
        ellipse 68% 58% at 50% 44%,
        transparent           0%,
        rgba(15,15,15, 0.44) 44%,
        rgba(15,15,15, 0.84) 100%
      );
      pointer-events: none;
    }

    /* ─── Profile photo ──────────────────────────────── */
    #photo {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 42%;
      /* start hidden / translated up; entrance anim corrects this */
      transform: translate(-50%, calc(-50% - 40px)) scale(0.88);
      opacity: 0;
      width: min(44vw, 260px);
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: top center;
      display: block;
      animation:
        photo-enter 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards,
        float       3.6s ease-in-out 0.85s infinite;
    }

    @keyframes photo-enter {
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%);              }
      50%       { transform: translate(-50%, calc(-50% - 14px)); }
    }

    /* ─── Button + label ─────────────────────────────── */
    #actions {
      position: absolute;
      z-index: 3;
      bottom: clamp(28px, 6vh, 60px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(14px, 2.4vh, 26px);
      width: 100%;
      opacity: 0;
      animation: actions-enter 0.55s ease-out 0.4s forwards;
    }

    @keyframes actions-enter {
      from { opacity: 0; transform: translate(-50%, 22px); }
      to   { opacity: 1; transform: translate(-50%,  0px); }
    }

    .find-btn {
      display: block;
      width: min(82vw, 420px);
      padding: 16px 0;
      background: rgba(12, 12, 12, 0.94);
      color: #00ffab;
      border: 1.5px solid rgba(0, 255, 171, 0.22);
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(14px, 2vw, 18px);
      letter-spacing: 0.14em;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition:
        background   0.22s ease,
        color        0.22s ease,
        border-color 0.22s ease,
        transform    0.18s ease,
        box-shadow   0.22s ease;
    }

    .find-btn:hover,
    .find-btn:focus-visible {
      background: #00ffab;
      color: #0d0d0d;
      border-color: #00ffab;
      transform: scale(1.025);
      box-shadow: 0 0 28px rgba(0, 255, 171, 0.35);
      outline: none;
    }

    .about-label {
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(16px, 2.4vw, 22px);
      color: #00ffab;
      letter-spacing: 0.16em;
    }
  </style>
</head>

<body>
  <div id="landing">

    <div id="text-bg"></div>
    <div id="overlay"></div>

    <img id="photo" src="./assets/images/avater.png" alt="TZ Shuhag">

    <div id="actions">
      <a class="find-btn" href="./main.html">Find Me Here &rarr;</a>
      <span class="about-label">About Me</span>
    </div>

  </div>

  <script>
    (function () {
      const bg   = document.getElementById('text-bg');
      const WORD = 'TZ SHUHAG  ';

      /*
        10 rows, evenly distributed via CSS flex:1.
        This fills 100% height on any screen — no JS height math needed.
      */
      const ROW_COUNT = 10;

      /*
        Calculate reps of WORD needed to fill one viewport width.
        Bebas Neue has roughly 0.58× width-to-height ratio.
      */
      const fs       = Math.max(42, Math.min(window.innerWidth * 0.085, 138));
      const wordPx   = fs * 0.58 * WORD.length;
      const reps     = Math.ceil(window.innerWidth / wordPx) + 2;
      const content  = WORD.repeat(reps); // ≥ 1 viewport wide per span

      /* Different speeds give a layered, depth-of-field feel */
      const durations = [18, 22, 16, 24, 19, 21, 17, 23, 20, 15];

      for (let i = 0; i < ROW_COUNT; i++) {
        const row = document.createElement('div');
        row.className = 't-row';

        const dir = i % 2 === 0 ? 'scroll-left' : 'scroll-right';
        const dur = durations[i % durations.length];

        /*
          Two spans with 180°-offset timing = perfectly seamless loop.
          When span-1 exits the left edge, span-2 is already filling in
          from the right at exactly the right position — no gap, no jump.
        */
        for (let j = 0; j < 2; j++) {
          const span = document.createElement('span');
          span.className   = 't-span';
          span.textContent = content;
          span.style.animation      = `${dir} ${dur}s linear infinite`;
          span.style.animationDelay = j === 1 ? `${-(dur / 2)}s` : '0s';
          row.appendChild(span);
        }

        bg.appendChild(row);
      }
    })();
  </script>
</body>
</html>
