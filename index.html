<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TZ Shuhag</title>
  <link rel="shortcut icon" href="./assets/images/logo.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    /* ─── Reset ─────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f0f;
    }

    /* ─── Full-screen stage ──────────────────────────── */
    #landing {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* ─── Text grid ──────────────────────────────────── */
    #text-bg {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      /* Rows stack naturally top-to-bottom, no flex distribution */
    }

    .t-row {
      /* Height = exactly the line-height set on the span.
         No centering, no flex — rows pack tight like real text. */
      overflow: hidden;
    }

    .t-span {
      display: block;
      white-space: nowrap;
      font-family: 'Bebas Neue', Impact, sans-serif;
      /*
        clamp(min, preferred, max)
        - Mobile  ~390 px wide : 8.5vw = ~33 px → clamped UP   to 82 px  (big & tight)
        - Tablet  ~768 px wide : 8.5vw = ~65 px → clamped UP   to 82 px
        - Desktop ~1200px wide : 8.5vw = 102 px → within range (natural scale)
        - Desktop ~1440px wide : 8.5vw = 122 px → within range
      */
      font-size: clamp(82px, 8.5vw, 140px);
      line-height: 1;       /* row height = exactly font-size, zero extra gap */
      letter-spacing: 0.01em;
      color: #00ffab;
      user-select: none;
      pointer-events: none;
    }

    /* ─── Radial vignette — bright centre, dark edges ── */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(
        ellipse 68% 58% at 50% 44%,
        transparent           0%,
        rgba(15,15,15, 0.44) 44%,
        rgba(15,15,15, 0.84) 100%
      );
      pointer-events: none;
    }

    /* ─── Profile photo ──────────────────────────────── */
    #photo {
      position: absolute;
      z-index: 2;
      left: 50%;
      top: 42%;
      transform: translate(-50%, calc(-50% - 40px)) scale(0.88);
      opacity: 0;
      width: min(44vw, 260px);
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: top center;
      display: block;
      animation:
        photo-enter 0.65s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards,
        float       3.6s ease-in-out 0.85s infinite;
    }

    @keyframes photo-enter {
      to {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%);              }
      50%       { transform: translate(-50%, calc(-50% - 14px)); }
    }

    /* ─── Button ─────────────────────────────────────── */
    #actions {
      position: absolute;
      z-index: 3;
      bottom: clamp(28px, 6vh, 60px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      opacity: 0;
      animation: actions-enter 0.55s ease-out 0.4s forwards;
    }

    @keyframes actions-enter {
      from { opacity: 0; transform: translate(-50%, 22px); }
      to   { opacity: 1; transform: translate(-50%,  0px); }
    }

    .find-btn {
      display: block;
      width: min(82vw, 420px);
      padding: 16px 0;
      background: rgba(12, 12, 12, 0.94);
      color: #00ffab;
      border: 1.5px solid rgba(0, 255, 171, 0.22);
      font-family: 'Bebas Neue', Impact, sans-serif;
      font-size: clamp(14px, 2vw, 18px);
      letter-spacing: 0.14em;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition:
        background   0.22s ease,
        color        0.22s ease,
        border-color 0.22s ease,
        transform    0.18s ease,
        box-shadow   0.22s ease;
    }

    .find-btn:hover,
    .find-btn:focus-visible {
      background: #00ffab;
      color: #0d0d0d;
      border-color: #00ffab;
      transform: scale(1.025);
      box-shadow: 0 0 28px rgba(0, 255, 171, 0.35);
      outline: none;
    }
  </style>
</head>

<body>
  <div id="landing">

    <div id="text-bg"></div>
    <div id="overlay"></div>

    <img id="photo" src="./assets/images/avater.png" alt="TZ Shuhag">

    <div id="actions">
      <a class="find-btn" href="./main.html">Find Me Here &rarr;</a>
    </div>

  </div>

  <script>
    (function () {
      const bg   = document.getElementById('text-bg');
      const WORD = 'TZ SHUHAG  ';

      /*
        Font size mirrors the CSS clamp so JS and CSS agree.
        line-height: 1 means row height = font-size exactly.
      */
      const fs      = Math.max(82, Math.min(window.innerWidth * 0.085, 140));
      const rowH    = fs;                                  // line-height: 1
      const rowsNeeded = Math.ceil(window.innerHeight / rowH) + 2; // +2 buffer rows

      /*
        Reps per row: enough text to bleed off both edges.
        Bebas Neue char width ≈ 0.58 × font-size.
      */
      const wordPx = fs * 0.58 * WORD.length;
      const reps   = Math.ceil(window.innerWidth / wordPx) + 3;
      const content = WORD.repeat(reps);

      for (let i = 0; i < rowsNeeded; i++) {
        const row  = document.createElement('div');
        row.className = 't-row';

        const span = document.createElement('span');
        span.className   = 't-span';
        span.textContent = content;
        row.appendChild(span);

        bg.appendChild(row);
      }
    })();
  </script>
</body>
</html>
